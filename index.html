<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SushiSync | Serverless Co-Watching</title>
    <meta name="description" content="A real-time, peer-to-peer co-watching and chatting app using WebRTC.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <!-- Setup View -->
    <div id="setup-view" class="view glass-panel active">
            <h1 class="logo-large">SushiSync</h1>
            <p class="subtitle">P2P Co-Watching & Chat</p>

            <div class="character-selection" style="margin-bottom: 2rem; background: rgba(255,255,255,0.6); border: 1px solid var(--panel-border); padding: 1rem; border-radius: 8px;">
                <h3 style="margin-bottom: 1rem; font-size: 1rem; color: var(--text-primary);">Choose Avatar</h3>
                <div class="avatar-options" style="display: flex; justify-content: center; gap: 1.5rem;">
                    <label style="cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
                        <span style="font-size: 2rem;">🍣</span>
                        <input type="radio" name="avatar" value="salmon" checked>
                    </label>
                    <label style="cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
                        <span style="font-size: 2rem;">🥚</span>
                        <input type="radio" name="avatar" value="tamago">
                    </label>
                    <label style="cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
                        <span style="font-size: 2rem;">🍙</span>
                        <input type="radio" name="avatar" value="onigiri">
                    </label>
                </div>
            </div>

            <div class="setup-controls">
            <div class="host-section">
                <h3>Host a Session</h3>
                <button id="btn-create" class="btn primary-btn">Create Room</button>
            </div>
            
            <div class="divider"><span>OR</span></div>
            
            <div class="join-section">
                <h3>Join a Session</h3>
                <input type="text" id="input-room-id" placeholder="Paste Invite Link or Room ID">
                <button id="btn-join" class="btn secondary-btn">Join Room</button>
            </div>
        </div>
        <div id="setup-status" class="status-message"></div>
    </div>

    <!-- Main Workspace View (Fullscreen) -->
    <div id="workspace-view" class="view hidden">
        <main class="workspace-content">
            <!-- Fullscreen Media -->
            <section class="media-area">
                <video id="media-video" autoplay playsinline></video>
                <div id="media-placeholder" class="placeholder">
                    <div class="placeholder-icon">📺</div>
                    <p id="placeholder-text">Waiting for host to share screen...</p>
                </div>
            </section>

            <!-- Bottom Controls Bar -->
            <div class="bottom-bar">
                <span class="room-pill">
                    ID: <span id="display-room-id">...</span>
                    <button id="btn-copy" class="icon-btn" title="Copy Invite Link">📋</button>
                </span>
                <div class="header-controls">
                    <button id="btn-share" class="btn primary-btn hidden">Share Screen</button>
                    <button id="btn-leave" class="btn" style="background: var(--accent-hover); color: white;">Leave Room</button>
                </div>
                <button id="btn-toggle-chat" class="btn secondary-btn">💬 Chat</button>
                <div id="connection-indicator" class="connection-indicator offline" title="Offline"></div>
            </div>

            <!-- Popover Chat -->
            <aside id="chat-sidebar" class="chat-area glass-panel hidden-sidebar">
                <div class="chat-header">
                    <h3>Live Chat</h3>
                    <button id="btn-close-chat" class="icon-btn" title="Close Chat">❌</button>
                </div>
                <div id="chat-messages" class="chat-messages">
                    <div class="message system">Welcome to SushiSync! Share your ID to connect.</div>
                </div>
                <div class="chat-input-wrapper">
                    <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
                    <button id="btn-send" class="btn primary-btn">Send</button>
                </div>
            </aside>
        </main>
    </div>

    <!-- Local Avatar -->
    <div id="local-avatar" class="avatar local" title="You">
        <div class="legs">
            <div class="leg left"></div>
            <div class="leg right"></div>
        </div>
        <div class="sushi-inner"></div>
    </div>

    <!-- Remote Avatar -->
    <div id="remote-avatar" class="avatar remote hidden" title="Guest">
        <div class="legs">
            <div class="leg left"></div>
            <div class="leg right"></div>
        </div>
        <div class="sushi-inner"></div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="glass-panel modal-content">
            <h3>Leave Session?</h3>
            <p>Are you sure you want to disconnect and return to the main menu?</p>
            <div class="modal-actions">
                <button id="btn-modal-cancel" class="btn secondary-btn">Cancel</button>
                <button id="btn-modal-confirm" class="btn" style="background: var(--accent-hover); color: white;">Leave</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
